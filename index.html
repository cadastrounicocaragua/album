<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álbum Copa – Sede da Gestão Cadastro Único/Conselhos</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #E8B84B;
    --gold-light: #F5D882;
    --gold-dark: #B8860B;
    --green: #0A6B3D;
    --green-light: #1A9B5A;
    --green-dark: #054A28;
    --bg: #0C1A0E;
    --card-bg: #101E12;
    --white: #F8F4E8;
  }
  body {
    background: var(--bg);
    font-family: 'Barlow', sans-serif;
    color: var(--white);
    min-height: 100vh;
    padding: 2rem 1rem 3rem;
  }

  /* HEADER */
  .album-header {
    text-align: center;
    margin-bottom: 2rem;
    position: relative;
    padding: 2rem 1.5rem 1.75rem;
  }
  .album-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 50%, var(--green-dark) 100%);
    border-radius: 16px;
    border: 1.5px solid var(--gold-dark);
    z-index: 0;
  }
  .header-inner { position: relative; z-index: 1; }
  .album-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.2rem, 7vw, 4rem);
    letter-spacing: 0.04em;
    color: var(--gold);
    line-height: 1;
    text-shadow: 0 2px 24px rgba(232,184,75,0.3);
  }
  .album-sector {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(0.85rem, 2.5vw, 1.1rem);
    font-weight: 700;
    color: rgba(248,244,232,0.9);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* SEÇÃO DO PACOTINHO ANIMADO */
  .pack-section {
    max-width: 800px;
    margin: 0 auto 2rem;
    background: #112414;
    border: 2px solid var(--green-light);
    border-radius: 16px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
  }

  /* O PACOTE DE FIGURINHAS FISICO */
  .pack-container {
    position: relative;
    width: 140px;
    height: 190px;
    perspective: 1000px;
    cursor: pointer;
    margin: 10px 0;
  }
  .pack-wrapper {
    width: 100%;
    height: 100%;
    position: relative;
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 100%);
    border: 3px solid var(--gold);
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.6), inset 0 0 15px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }
  .pack-wrapper::before {
    content: 'COPA 2026';
    font-family: 'Bebas Neue', sans-serif;
    color: var(--gold);
    font-size: 20px;
    letter-spacing: 1px;
  }
  .pack-wrapper::after {
    content: '⚽ GESTÃO ⚽';
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    color: var(--white);
    margin-top: 5px;
    opacity: 0.8;
  }

  /* Animação de tremor do pacote */
  .pack-container.shaking .pack-wrapper {
    animation: shakePack 0.5s infinite;
  }
  @keyframes shakePack {
    0% { transform: translate(2px, 1px) rotate(0deg); }
    10% { transform: translate(-1px, -2px) rotate(-1deg); }
    20% { transform: translate(-3px, 0px) rotate(1deg); }
    30% { transform: translate(0px, 2px) rotate(0deg); }
    40% { transform: translate(1px, -1px) rotate(1deg); }
    50% { transform: translate(-1px, 2px) rotate(-1deg); }
    60% { transform: translate(-3px, 1px) rotate(0deg); }
    70% { transform: translate(2px, 1px) rotate(-1deg); }
    80% { transform: translate(-1px, -1px) rotate(1deg); }
    90% { transform: translate(2px, 2px) rotate(0deg); }
    100% { transform: translate(1px, -2px) rotate(-1deg); }
  }

  /* Animação de Rasgar / Sumir */
  .pack-container.ripping .pack-wrapper {
    animation: ripPack 0.6s forwards ease-in;
  }
  @keyframes ripPack {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1) translateY(-10px); filter: brightness(1.5); }
    100% { transform: scale(0.3) rotate(15deg); opacity: 0; filter: blur(5px); }
  }

  .pack-btn {
    font-family: 'Bebas Neue', sans-serif;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
    color: var(--green-dark);
    font-size: 1.5rem;
    padding: 12px 35px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.05em;
    box-shadow: 0 4px 15px rgba(232,184,75,0.4);
    transition: all 0.2s ease;
  }
  .pack-btn:hover { transform: scale(1.03); }
  .pack-btn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }

  .pack-opened-display {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
    margin-top: 5px;
    min-height: 60px;
    width: 100%;
  }
  .mini-sticker {
    background: var(--card-bg);
    border: 1px solid var(--gold);
    border-radius: 6px;
    padding: 8px 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--white);
    min-width: 100px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    opacity: 0;
    transform: translateY(15px);
    animation: revealMini 0.4s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes revealMini {
    to { opacity: 1; transform: translateY(0); }
  }
  .mini-sticker span { display: block; color: var(--gold); font-size: 11px; margin-top: 2px; }
  .mini-sticker.is-new span { color: #1A9B5A; font-weight: bold; }

  /* BANNER DE PARABÉNS */
  .congrats-message {
    display: none;
    background: linear-gradient(135deg, #1A3A1E 0%, var(--green-dark) 100%);
    border: 2px solid var(--gold);
    color: var(--gold-light);
    max-width: 800px;
    margin: 0 auto 1.5rem;
    padding: 15px;
    text-align: center;
    border-radius: 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    text-transform: uppercase;
    box-shadow: 0 0 20px rgba(232,184,75,0.3);
  }

  /* PLACARD CONTADOR */
  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 1.25rem;
  }
  .counter-display {
    font-size: 14px;
    color: var(--white);
    background: rgba(232, 184, 75, 0.1);
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px dashed var(--gold);
    display: inline-block;
    margin-top: 5px;
  }

  /* GRID DE FIGURINHAS */
  .sticker-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    max-width: 800px;
    margin: 0 auto;
  }
  .sticker-card {
    background: var(--card-bg);
    border: 1.5px solid rgba(232,184,75,0.15);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    transition: transform 0.3s, border-color 0.3s;
    cursor: pointer;
  }
  
  /* Estado Inicial Oculto */
  .sticker-card .card-img-wrap { filter: grayscale(100%) brightness(30%); opacity: 0.4; transition: all 0.4s ease; }
  .sticker-card .card-body { opacity: 0.3; transition: all 0.4s ease; }
  
  .sticker-card::before {
    content: attr(data-number);
    position: absolute;
    top: 35%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    color: rgba(232,184,75,0.15);
    z-index: 1;
  }

  /* Selo Disponível */
  .sticker-card.can-paste::after {
    content: 'DISPONÍVEL';
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--green-light);
    color: white;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    z-index: 3;
    animation: pulseGlow 1.5s infinite alternate;
  }

  @keyframes pulseGlow {
    from { box-shadow: 0 0 2px var(--green-light); }
    to { box-shadow: 0 0 10px var(--green-light); }
  }

  .card-num {
    position: absolute;
    top: 8px;
    left: 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    color: var(--green-dark);
    background: var(--gold);
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }
  .card-img-wrap { width: 100%; aspect-ratio: 1; overflow: hidden; position: relative; background: var(--green-dark); }
  .card-img-wrap::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 55%, rgba(10,26,14,0.85) 100%); }
  .card-img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-body { padding: 8px 10px 10px; border-top: 1px solid rgba(232,184,75,0.12); }
  .card-name { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(0.82rem, 2.4vw, 1rem); font-weight: 700; color: var(--white); text-transform: uppercase; }
  .card-role { font-size: clamp(0.65rem, 1.8vw, 0.72rem); color: var(--gold); margin-top: 2px; }
  .card-stars { font-size: 9px; color: var(--gold); margin-top: 4px; }

  /* ESTADO: COLADA */
  .sticker-card.pasted::before, .sticker-card.pasted::after { display: none !important; }
  .sticker-card.pasted .card-img-wrap { filter: grayscale(0%) brightness(100%); opacity: 1; }
  .sticker-card.pasted .card-body { opacity: 1; }
  .sticker-card.pasted { border-color: rgba(232,184,75,0.6); animation: pasteAnimation 0.4s forwards; }
  
  @keyframes pasteAnimation {
    0% { transform: scale(1.05); }
    100% { transform: scale(1); box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
  }

  @media (max-width: 500px) {
    .sticker-grid { gap: 8px; }
  }
</style>
</head>
<body>

<div class="album-header">
  <div class="header-inner">
